name: Integrity Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integrity:
    name: Code Integrity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Verify application starts
        working-directory: backend
        run: |
          node -e "
            const app = require('./src/app');
            console.log('Application loaded successfully');
            process.exit(0);
          "
        env:
          PORT: 3000
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: aetherops
          DB_USER: postgres
          DB_PASSWORD: postgres

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: integrity

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: false
          tags: aetherops-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
