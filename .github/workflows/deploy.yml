name: Deploy Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build and push image
      uses: docker/build-push-action@v7
      with:
        context: ./backend
        push: true
        tags: |
          ghcr.io/shahisaugat/aetherops-api:latest
          ghcr.io/shahisaugat/aetherops-api:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
    - name: SSH and Deploy
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USER }}
        key: ${{ secrets.VM_SSH_KEY }}
        script: |
          cd ~/aetherops/infra/docker

          echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u shahisaugat --password-stdin

          docker compose pull

          docker compose up -d

          docker exec -i aetherops-postgres psql -U postgres -d aetherops < ~/aetherops/init.sql

          sleep 10

          docker exec aetherops-api node -e "
            const http = require('http');
            const req = http.get('http://localhost:3000/health', (res) => {
              if (res.statusCode === 200) {
                console.log('Health check passed');
                process.exit(0);
              } else {
                console.error('Health check failed');
                process.exit(1);
              }
            });
            req.on('error', () => process.exit(1));
          "

          docker exec -it aetherops-postgres psql -U postgres -d aetherops -c "
          CREATE TABLE IF NOT EXISTS users (
            id UUID PRIMARY KEY,
            name VARCHAR(100) NOT NULL,
            email VARCHAR(100) UNIQUE NOT NULL,
            created_at TIMESTAMP DEFAULT NOW()
          );"

          echo "Deployment complete"
