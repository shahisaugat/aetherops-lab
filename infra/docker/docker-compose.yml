services:
  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: aetherops-api
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=aetherops
      - DB_USER=postgres
      - DB_PASSWORD=AetherOps
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres
    container_name: aetherops-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=AetherOps
      - POSTGRES_DB=aetherops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
