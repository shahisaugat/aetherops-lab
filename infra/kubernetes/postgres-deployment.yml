apiVersion: apps/v1
kind: Deployment
metadata:
  name: aetherops-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aetherops-postgres
  template:
    metadata:
      labels:
        app: aetherops-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          value: "AetherOps"
        - name: POSTGRES_DB
          value: "aetherops"
        readinessProbe:
          exec:
            command: [ "pg_isready", "-U", "postgres" ]
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: aetherops-postgres
spec:
  selector:
    app: aetherops-postgres
  ports:
  - port: 5432
    targetPort: 5432
